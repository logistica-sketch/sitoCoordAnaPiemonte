<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Dashboard — CAP ANA Piemonte</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Titillium Web',Arial,sans-serif;background:#f2f2f2;color:#333;min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:linear-gradient(135deg,#003d8f 55%,#1a5fb4 60%,#f0b400 100%);height:6px;}
.header{background:#002d6e;padding:.7rem 1.5rem;display:flex;justify-content:space-between;align-items:center;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-logo{width:32px;height:32px;object-fit:contain;}
.header-title{color:#fff;font-size:.85rem;font-weight:700;}
.header-user{color:rgba(255,255,255,.7);font-size:.72rem;display:flex;align-items:center;gap:10px;}
.user-dot{width:30px;height:30px;border-radius:50%;background:#f0b400;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#002060;flex-shrink:0;}
.user-info{display:flex;flex-direction:column;align-items:flex-end;}
.user-nome{color:#fff;font-size:.75rem;font-weight:600;}
.user-ruolo{font-size:.62rem;color:rgba(255,255,255,.5);}
.btn-logout{background:rgba(255,255,255,.1);border:.5px solid rgba(255,255,255,.25);color:rgba(255,255,255,.7);padding:.25rem .7rem;font-size:.65rem;border-radius:2px;cursor:pointer;font-family:inherit;transition:all .15s;}
.btn-logout:hover{background:rgba(255,255,255,.2);color:#fff;}
.navbar{background:#f0b400;padding:0 1.5rem;display:flex;}
.nav-item{font-size:.82rem;font-weight:700;color:#002060;padding:.5rem 1rem;border-bottom:3px solid transparent;text-decoration:none;cursor:pointer;transition:all .15s;}
.nav-item:hover{background:rgba(0,32,96,.08);}
.nav-item.active{border-bottom-color:#002060;}
.nav-item:not(.active){opacity:.6;}
/* loading */
.loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
.spinner{width:36px;height:36px;border:3px solid rgba(0,61,143,.15);border-top-color:#003d8f;border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-text{font-size:.8rem;color:#888;}
/* content */
.content{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:1.5rem;}
.welcome{font-size:.75rem;color:#666;margin-bottom:.8rem;}
.welcome b{color:#002d6e;}
/* alert */
.alert-bar{background:#fff8e1;border-left:3px solid #f0b400;padding:.55rem 1rem;margin-bottom:1rem;display:flex;align-items:center;gap:8px;font-size:.7rem;color:#7a5800;}
.alert-dot{width:8px;height:8px;border-radius:50%;background:#f0b400;flex-shrink:0;}
/* stats */
.stats{display:grid;gap:10px;margin-bottom:1rem;}
.stat{background:#fff;border:.5px solid #ddd;border-top:3px solid var(--ac);padding:.7rem 1rem;}
.stat-label{font-size:.6rem;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:.3rem;}
.stat-val{font-size:1.5rem;font-weight:700;color:#002d6e;line-height:1;}
.stat-sub{font-size:.62rem;color:#bbb;margin-top:.2rem;}
/* calendario */
.cal-wrap{background:#fff;border:.5px solid #ddd;border-top:3px solid #003d8f;margin-bottom:1rem;}
.cal-header{background:#003d8f;color:#fff;display:flex;justify-content:space-between;align-items:center;padding:.55rem 1rem;}
.cal-title{font-size:.82rem;font-weight:700;}
.cal-nav{font-size:.75rem;opacity:.8;cursor:pointer;padding:0 .5rem;user-select:none;}
.cal-nav:hover{opacity:1;}
.cal-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));}
.cal-dow{text-align:center;font-size:.6rem;font-weight:700;color:#999;padding:.4rem 0;border-bottom:.5px solid #eee;text-transform:uppercase;}
.cal-day{text-align:center;padding:.3rem .1rem;font-size:.7rem;color:#555;border-bottom:.5px solid #f8f8f8;min-height:42px;cursor:pointer;transition:background .1s;}
.cal-day:hover{background:#f0f4ff;}
.cal-day.other{color:#ccc;}
.cal-day.today .dn{background:#003d8f;color:#fff;font-weight:700;}
.dn{display:inline-block;width:24px;height:24px;line-height:24px;border-radius:50%;}
.cal-dot{width:5px;height:5px;border-radius:50%;margin:1px auto 0;}
.ev-conv{background:#003d8f;}
.ev-mezzi{background:#1e5c1e;}
.ev-assic{background:#854f0b;}
.cal-legend{display:flex;gap:14px;padding:.5rem 1rem;border-top:.5px solid #eee;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:.62rem;color:#777;}
.leg-dot{width:8px;height:8px;border-radius:50%;}
/* tools */
.tools{display:grid;gap:10px;}
.tool{background:#fff;border:.5px solid #ddd;border-top:3px solid var(--ac);padding:.9rem;}
.tool-badge{display:inline-block;background:#e6f1fb;color:#0c447c;font-size:.55rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.1rem .4rem;border-radius:2px;margin-bottom:.5rem;}
.tool-title{font-size:.85rem;font-weight:700;color:#002d6e;margin-bottom:.25rem;}
.tool-desc{font-size:.68rem;color:#999;line-height:1.5;}
.tool-btns{margin-top:.7rem;display:flex;gap:6px;flex-wrap:wrap;}
.tbtn{font-size:.65rem;font-weight:700;padding:.28rem .65rem;border-radius:2px;cursor:pointer;font-family:inherit;text-decoration:none;display:inline-block;transition:opacity .15s;}
.tbtn:hover{opacity:.8;}
.tbtn-primary{background:var(--ac);color:#fff;border:none;}
.tbtn-outline{background:transparent;color:var(--ac);border:1.5px solid var(--ac);}
/* footer */
.site-footer{margin-top:auto;}
.footer-accent{background:#f0b400;height:4px;}
.footer-body{background:#002d6e;padding:.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;}
.footer-nome{color:#fff;font-size:.8rem;font-weight:700;}
.footer-info{color:rgba(255,255,255,.55);font-size:.68rem;text-align:center;}
.footer-copy{color:rgba(255,255,255,.35);font-size:.62rem;}
/* responsive */
@media(max-width:600px){.content{padding:1rem;}.stats{grid-template-columns:1fr 1fr;}.tools{grid-template-columns:1fr;}}
</style>
</head>

<script>
const SUPA_URL = 'https://ofuxzwsyjroocqqajadu.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9mdXh6d3N5anJvb2NxcWFqYWR1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0NTMxNTQsImV4cCI6MjA5MjAyOTE1NH0.zZgfD7beKUf0MmiZ9Mr_tyLSFATpy4xX2lhR1dMFWfI';
const { createClient } = supabase;
const sb = createClient(SUPA_URL, SUPA_KEY);

// Mappa ruoli
const RUOLI_LABEL = {
  resp_it: 'Responsabile IT',
  segretario: 'Segretario',
  resp_mezzi: 'Resp. Mezzi e Attrezzature',
  resp_formazione: 'Resp. Formazione'
};

// Permessi per sezione
const PERMESSI = {
  convocazioni: ['resp_it','segretario'],
  assicurazioni: ['resp_it','segretario'],
  mezzi:         ['resp_it','segretario','resp_mezzi'],
  formazione:    ['resp_it','segretario','resp_formazione']
};

let profilo = null;
let meseCorrente = new Date().getMonth();
let annoCorrente = new Date().getFullYear();
let eventiCalendario = [];

// ── INIT ──────────────────────────────────────────────────
async function init() {
  const el = document.getElementById('loading');
  el.innerHTML = '<div class="spinner"></div><div class="loading-text">Verifica sessione...</div>';

  const { data: { session }, error: sessErr } = await sb.auth.getSession();

  if (sessErr) {
    el.innerHTML = '<div class="loading-text" style="color:red">Errore sessione: ' + sessErr.message + '</div>';
    return;
  }

  if (!session) {
    el.innerHTML = '<div class="loading-text">Nessuna sessione attiva. <a href="login.html">Login</a></div>';
    return;
  }

  el.innerHTML = '<div class="spinner"></div><div class="loading-text">Sessione OK — carico profilo per ' + session.user.email + '...</div>';

  const { data: prof, error } = await sb.from('profili').select('*').eq('id', session.user.id).single();

  if (error) {
    el.innerHTML = '<div class="loading-text" style="color:red">Errore DB: ' + error.message + '<br/>ID: ' + session.user.id + '</div>';
    return;
  }

  if (!prof) {
    el.innerHTML = '<div class="loading-text" style="color:red">Profilo non trovato per ID: ' + session.user.id + '</div>';
    return;
  }

  if (!prof.attivo) {
    el.innerHTML = '<div class="loading-text" style="color:red">Utente disattivato.</div>';
    await sb.auth.signOut();
    return;
  }

  profilo = prof;
  renderUI();
  await caricaStats();
  await caricaEventi();
  renderCalendario();
  renderTools();

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main_content').style.display = 'block';
}

// ── RENDER UI ─────────────────────────────────────────────
function renderUI() {
  const iniziali = (profilo.nome[0] + profilo.cognome[0]).toUpperCase();
  document.getElementById('hdr_iniziali').textContent = iniziali;
  document.getElementById('hdr_nome').textContent = profilo.nome + ' ' + profilo.cognome;
  document.getElementById('hdr_ruolo').textContent = RUOLI_LABEL[profilo.ruolo] || profilo.ruolo;

  const oggi = new Date().toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('welcome_text').innerHTML = `Bentornato, <b>${profilo.nome}</b> — ${oggi}`;

  // Navbar dinamica per ruolo
  const nav = document.getElementById('navbar');
  nav.innerHTML = '<a class="nav-item active" href="dashboard.html">Dashboard</a>';
  if (haAccesso('convocazioni')) nav.innerHTML += '<a class="nav-item" href="convocazioni.html">Convocazioni</a>';
  if (haAccesso('assicurazioni')) nav.innerHTML += '<a class="nav-item" href="assicurazioni.html">Assicurazioni</a>';
  if (haAccesso('mezzi'))         nav.innerHTML += '<a class="nav-item" href="mezzi.html">Parco Mezzi</a>';
  if (haAccesso('formazione'))    nav.innerHTML += '<a class="nav-item" href="formazione.html">Formazione</a>';
}

function haAccesso(sezione) {
  return PERMESSI[sezione] && PERMESSI[sezione].includes(profilo.ruolo);
}

// ── STATS ─────────────────────────────────────────────────
async function caricaStats() {
  const grid = document.getElementById('stats_grid');
  const cols = [];
  const alerts = [];

  if (haAccesso('mezzi')) {
    const { count: totMezzi } = await sb.from('mezzi').select('*',{count:'exact',head:true}).eq('attivo',true);
    // revisioni in scadenza entro 30 gg
    const fra30 = new Date(); fra30.setDate(fra30.getDate()+30);
    const { count: revScad } = await sb.from('mezzi').select('*',{count:'exact',head:true})
      .eq('attivo',true).lte('data_revisione', fra30.toISOString().split('T')[0]);
    cols.push({label:'Mezzi attivi', val: totMezzi||0, sub: revScad ? `${revScad} revisioni in scadenza`:'Nessuna scadenza imminente', ac:'#003d8f'});
    if (revScad) alerts.push(`${revScad} revisioni mezzo in scadenza entro 30 giorni`);
  }

  if (haAccesso('assicurazioni')) {
    const fra30 = new Date(); fra30.setDate(fra30.getDate()+30);
    const { count: assicScad } = await sb.from('assicurazioni').select('*',{count:'exact',head:true})
      .lte('data_scadenza', fra30.toISOString().split('T')[0]);
    cols.push({label:'Assicurazioni', val: assicScad||0, sub:'in scadenza entro 30 gg', ac:'#854f0b'});
    if (assicScad) alerts.push(`${assicScad} polizza/e assicurative in scadenza`);
  }

  if (haAccesso('convocazioni')) {
    const primoMese = new Date(); primoMese.setDate(1);
    const { count: conv } = await sb.from('convocazioni').select('*',{count:'exact',head:true})
      .gte('created_at', primoMese.toISOString());
    cols.push({label:'Convocazioni', val: conv||0, sub:'questo mese', ac:'#1e5c1e'});
  }

  if (haAccesso('formazione')) {
    cols.push({label:'Formazione', val:'—', sub:'corsi in programma', ac:'#5c1e5c'});
  }

  // Griglia stats
  const ncols = Math.min(cols.length, 4);
  grid.style.gridTemplateColumns = `repeat(${ncols}, minmax(0,1fr))`;
  grid.innerHTML = cols.map(c => `
    <div class="stat" style="--ac:${c.ac};">
      <div class="stat-label">${c.label}</div>
      <div class="stat-val">${c.val}</div>
      <div class="stat-sub">${c.sub}</div>
    </div>`).join('');

  // Alert bar
  if (alerts.length) {
    document.getElementById('alert_bar').style.display = 'flex';
    document.getElementById('alert_text').textContent = alerts.join(' · ');
  }
}

// ── CALENDARIO ────────────────────────────────────────────
async function caricaEventi() {
  eventiCalendario = [];

  if (haAccesso('convocazioni')) {
    const { data } = await sb.from('convocazioni').select('data_seconda_conv,tipo');
    (data||[]).forEach(c => eventiCalendario.push({data: c.data_seconda_conv, tipo:'conv'}));
  }
  if (haAccesso('mezzi')) {
    const { data } = await sb.from('mezzi').select('data_revisione,targa').eq('attivo',true);
    (data||[]).forEach(m => { if(m.data_revisione) eventiCalendario.push({data: m.data_revisione, tipo:'mezzi'}); });
  }
  if (haAccesso('assicurazioni')) {
    const { data } = await sb.from('assicurazioni').select('data_scadenza');
    (data||[]).forEach(a => eventiCalendario.push({data: a.data_scadenza, tipo:'assic'}));
  }
}

function renderCalendario() {
  const MESI = ['Gennaio','Febbraio','Marzo','Aprile','Maggio','Giugno','Luglio','Agosto','Settembre','Ottobre','Novembre','Dicembre'];
  const GIORNI = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
  document.getElementById('cal_title').textContent = `${MESI[meseCorrente]} ${annoCorrente}`;

  const grid = document.getElementById('cal_grid');
  let html = GIORNI.map(g=>`<div class="cal-dow">${g}</div>`).join('');

  const primoGiorno = new Date(annoCorrente, meseCorrente, 1);
  const ultimoGiorno = new Date(annoCorrente, meseCorrente+1, 0).getDate();
  const oggi = new Date();

  // offset lunedì=0
  let offset = primoGiorno.getDay() - 1;
  if (offset < 0) offset = 6;

  // giorni mese precedente
  const ultPrev = new Date(annoCorrente, meseCorrente, 0).getDate();
  for (let i = offset-1; i >= 0; i--) {
    html += `<div class="cal-day other"><span class="dn">${ultPrev-i}</span></div>`;
  }

  // giorni mese corrente
  for (let g = 1; g <= ultimoGiorno; g++) {
    const dataStr = `${annoCorrente}-${String(meseCorrente+1).padStart(2,'0')}-${String(g).padStart(2,'0')}`;
    const isOggi = g===oggi.getDate() && meseCorrente===oggi.getMonth() && annoCorrente===oggi.getFullYear();
    const evGiorno = eventiCalendario.filter(e => e.data === dataStr);
    const dots = evGiorno.map(e=>`<div class="cal-dot ev-${e.tipo}"></div>`).join('');
    html += `<div class="cal-day${isOggi?' today':''}"><span class="dn">${g}</span>${dots}</div>`;
  }

  // giorni mese successivo
  const totCelle = offset + ultimoGiorno;
  const rimanenti = totCelle % 7 === 0 ? 0 : 7 - (totCelle % 7);
  for (let g = 1; g <= rimanenti; g++) {
    html += `<div class="cal-day other"><span class="dn">${g}</span></div>`;
  }

  grid.innerHTML = html;
}

function cambiasMese(dir) {
  meseCorrente += dir;
  if (meseCorrente < 0) { meseCorrente = 11; annoCorrente--; }
  if (meseCorrente > 11) { meseCorrente = 0; annoCorrente++; }
  renderCalendario();
}
